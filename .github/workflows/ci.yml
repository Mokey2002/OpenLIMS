name: OpenLIMS CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: test-secret-key
      DEBUG: "1"
      POSTGRES_DB: openlims
      POSTGRES_USER: openlims
      POSTGRES_PASSWORD: openlims
      DB_HOST: db
      DB_PORT: 5432
      INSTRUMENT_API_KEY: my-shared-lab-instrument-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deploy env file
        run: |
          cp deploy/.env.example deploy/.env || true
          cat >> deploy/.env <<EOF
          SECRET_KEY=test-secret-key
          DEBUG=1
          POSTGRES_DB=openlims
          POSTGRES_USER=openlims
          POSTGRES_PASSWORD=openlims
          DB_HOST=db
          DB_PORT=5432
          INSTRUMENT_API_KEY=my-shared-lab-instrument-key
          EOF

      - name: Build Docker services
        run: |
          docker compose -p openlims -f deploy/docker-compose.yml build

      - name: Start database
        run: |
          docker compose -p openlims -f deploy/docker-compose.yml up -d db

      - name: Run Django checks
        run: |
          docker compose -p openlims -f deploy/docker-compose.yml run --rm api python manage.py check

      - name: Check migrations
        run: |
          docker compose -p openlims -f deploy/docker-compose.yml run --rm api python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: |
          docker compose -p openlims -f deploy/docker-compose.yml run --rm api python manage.py migrate

      - name: Run tests
        run: |
          docker compose -p openlims -f deploy/docker-compose.yml run --rm api pytest -v

      - name: Stop services
        if: always()
        run: |
          docker compose -p openlims -f deploy/docker-compose.yml down -v
